[program:asd-backend]
directory=/srv/asd-system/fullstack/backend
command=/bin/bash -lc 'set -a && source /srv/asd-system/fullstack/deploy/env/backend.production.env && exec /srv/asd-system/fullstack/backend/.venv/bin/gunicorn config.wsgi:application --workers 4 --bind 127.0.0.1:8000 --timeout 120 --access-logfile - --error-logfile -'
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/asd-system/backend.log
stderr_logfile=/var/log/asd-system/backend-error.log
environment=DJANGO_SETTINGS_MODULE="config.settings"

[program:asd-celery-worker]
directory=/srv/asd-system/fullstack/backend
command=/bin/bash -lc 'set -a && source /srv/asd-system/fullstack/deploy/env/backend.production.env && exec /srv/asd-system/fullstack/backend/.venv/bin/celery -A config.celery:app worker --loglevel=info --concurrency=4'
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/asd-system/celery-worker.log
stderr_logfile=/var/log/asd-system/celery-worker-error.log
environment=DJANGO_SETTINGS_MODULE="config.settings"

[program:asd-celery-beat]
directory=/srv/asd-system/fullstack/backend
command=/bin/bash -lc 'set -a && source /srv/asd-system/fullstack/deploy/env/backend.production.env && exec /srv/asd-system/fullstack/backend/.venv/bin/celery -A config.celery:app beat --loglevel=info --pidfile='
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/asd-system/celery-beat.log
stderr_logfile=/var/log/asd-system/celery-beat-error.log
environment=DJANGO_SETTINGS_MODULE="config.settings"
