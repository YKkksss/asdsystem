<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>岚仓档案数字化与流转系统</title>
    <style>
      :root {
        --bg: #eef3ea;
        --panel: #ffffff;
        --text: #1f2a1f;
        --muted: #5a6a5a;
        --accent: #2e5b3d;
        --line: #d7e1d5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(46, 91, 61, 0.12), transparent 32%),
          linear-gradient(135deg, #f4f7f1 0%, #e7efe4 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(760px, 100%);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 40px 32px;
        box-shadow: 0 20px 60px rgba(31, 42, 31, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.75;
      }

      .tag {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(46, 91, 61, 0.08);
        color: var(--accent);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-top: 28px;
      }

      .item {
        padding: 16px;
        border-radius: 16px;
        background: #f8fbf7;
        border: 1px solid var(--line);
      }

      .item strong {
        display: block;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <span class="tag">前端占位页面</span>
      <h1>岚仓档案数字化与流转系统</h1>
      <p>
        当前前端容器已通过 Nginx 启动。后续接入 Vue 3 项目后，重新构建镜像即可替换本占位页面。
      </p>
      <div class="grid">
        <section class="item">
          <strong>前端访问</strong>
          <span>默认端口 `8080`</span>
        </section>
        <section class="item">
          <strong>后端代理</strong>
          <span>`/api` 与 `/admin` 已预留反向代理</span>
        </section>
        <section class="item">
          <strong>当前状态</strong>
          <span>适合作为项目初始化阶段的占位页面</span>
        </section>
      </div>
    </main>
  </body>
</html>
